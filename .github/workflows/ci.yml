name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ============================================================
  # 1. Lint & Test — Backend (NestJS)
  # ============================================================
  lint-test-backend:
    name: Lint & Test (Backend)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pipibook
          POSTGRES_PASSWORD: pipibook
          POSTGRES_DB: pipibook_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://pipibook:pipibook@localhost:5432/pipibook_test

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run build -- --noEmit 2>/dev/null || npx tsc --noEmit

      - name: Unit tests
        run: npm run test -- --passWithNoTests
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://pipibook:pipibook@localhost:5432/pipibook_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret-do-not-use-in-prod
          JWT_REFRESH_SECRET: ci-test-refresh-secret-do-not-use-in-prod

      - name: E2E tests
        run: npm run test:e2e -- --passWithNoTests
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://pipibook:pipibook@localhost:5432/pipibook_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret-do-not-use-in-prod
          JWT_REFRESH_SECRET: ci-test-refresh-secret-do-not-use-in-prod

  # ============================================================
  # 2. Lint & Type-Check — Frontend (Next.js)
  # ============================================================
  lint-test-frontend:
    name: Lint & Type-Check (Frontend)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

  # ============================================================
  # 3. Docker Build — Backend
  # ============================================================
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    needs: [lint-test-backend]

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/pipibook-backend
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # 4. Docker Build — Frontend
  # ============================================================
  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    needs: [lint-test-frontend]

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/pipibook-frontend
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_LINE_CHANNEL_ID=${{ secrets.NEXT_PUBLIC_LINE_CHANNEL_ID }}
            NEXT_PUBLIC_LINE_LIFF_ID=${{ secrets.NEXT_PUBLIC_LINE_LIFF_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # 5. Deploy — only on push to main
  # ============================================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: https://${{ secrets.PRODUCTION_DOMAIN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd /opt/pipibook

            # Authenticate with GHCR on the server
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin

            # Pull latest images
            IMAGE_TAG=sha-$(echo "${{ github.sha }}" | cut -c1-7) \
            GITHUB_REPOSITORY=${{ github.repository }} \
              docker compose -f docker-compose.prod.yml pull

            # Rolling restart — zero-downtime with health checks
            IMAGE_TAG=sha-$(echo "${{ github.sha }}" | cut -c1-7) \
            GITHUB_REPOSITORY=${{ github.repository }} \
              docker compose -f docker-compose.prod.yml up -d \
                --remove-orphans --wait --wait-timeout 120

            # Clean up dangling images to reclaim disk space
            docker image prune -f

            echo "Deployment complete: ${{ github.sha }}"
