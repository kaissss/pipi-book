# Railway / Nixpacks build for the PiPiBook backend.
# Root Directory in Railway must be set to: backend

[phases.setup]
# openssl is required by the Prisma query engine at runtime.
nixPkgs = ["nodejs_20", "openssl"]

[phases.install]
# `npm install` triggers the postinstall hook which runs `prisma generate`,
# so the Prisma client is always present before the build.
cmds = ["npm install"]

[phases.build]
cmds = ["npm run build"]

[start]
# Apply any pending migrations, then start the server.
cmd = "npm run railway:start"
