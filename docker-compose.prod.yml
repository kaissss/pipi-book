version: "3.9"

# ============================================================
# PiPiBook — Production Docker Compose
# Postgres → Supabase (DATABASE_URL in environment)
# Redis   → Upstash   (REDIS_URL in environment)
# TLS is terminated by Nginx (or your load balancer / Cloudflare).
# ============================================================

services:
  # ----------------------------------------------------------
  # Backend — NestJS
  # ----------------------------------------------------------
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY}/pipibook-backend:${IMAGE_TAG:-latest}
    container_name: pipibook_backend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 4000
    env_file:
      - .env.production
    expose:
      - "4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ----------------------------------------------------------
  # Frontend — Next.js standalone
  # ----------------------------------------------------------
  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY}/pipibook-frontend:${IMAGE_TAG:-latest}
    container_name: pipibook_frontend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    env_file:
      - .env.production
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      backend:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ----------------------------------------------------------
  # Nginx — reverse proxy + TLS termination
  # Bind mount ./nginx/nginx.conf (read-only).
  # If using Cloudflare Full(Strict), you still need a valid
  # origin cert — see docs/DEPLOYMENT.md.
  # ----------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: pipibook_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro     # place fullchain.pem + privkey.pem here
      - nginx_cache:/var/cache/nginx
    depends_on:
      - backend
      - frontend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  nginx_cache:
    driver: local
