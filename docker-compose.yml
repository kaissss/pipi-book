version: "3.9"

# ============================================================
# PiPiBook — Development Docker Compose
# Includes local Postgres + Redis for zero-dependency startup.
# Hot reload is enabled for both backend and frontend.
# ============================================================

x-common-env: &common-env
  NODE_ENV: development

services:
  # ----------------------------------------------------------
  # PostgreSQL 16
  # ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: pipibook_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pipibook
      POSTGRES_PASSWORD: pipibook
      POSTGRES_DB: pipibook
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pipibook -d pipibook"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ----------------------------------------------------------
  # Redis 7
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: pipibook_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # Backend — NestJS (hot reload via ts-node-dev / nest start --watch)
  # ----------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: deps          # only install deps, mount source for hot reload
    container_name: pipibook_backend
    restart: unless-stopped
    command: npm run start:dev
    environment:
      <<: *common-env
      PORT: 4000
      DATABASE_URL: postgresql://pipibook:pipibook@postgres:5432/pipibook
      REDIS_URL: redis://redis:6379
    env_file:
      - .env
    ports:
      - "4000:4000"
      - "9229:9229"     # Node.js debugger
    volumes:
      - ./backend:/app
      - /app/node_modules  # prevent host node_modules from overwriting container's
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ----------------------------------------------------------
  # Frontend — Next.js (hot reload via next dev)
  # ----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: deps          # only install deps, mount source for hot reload
    container_name: pipibook_frontend
    restart: unless-stopped
    command: npm run dev
    environment:
      <<: *common-env
      PORT: 3000
      NEXT_PUBLIC_API_URL: http://localhost:4000
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
