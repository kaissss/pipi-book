# ============================================================
# PiPiBook — Nginx Configuration
# Reverse proxy for Next.js (port 3000) and NestJS (port 4000).
# WebSocket support, gzip, and security headers included.
# ============================================================

worker_processes auto;
worker_rlimit_nofile 65535;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept       on;
    use                epoll;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ----------------------------------------------------------
    # Logging
    # ----------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # ----------------------------------------------------------
    # Performance
    # ----------------------------------------------------------
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 4096;
    server_tokens      off;            # hide Nginx version

    # ----------------------------------------------------------
    # Gzip compression
    # ----------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_min_length   256;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml
        image/x-icon;

    # ----------------------------------------------------------
    # Upstream definitions
    # Container names from docker-compose.prod.yml
    # ----------------------------------------------------------
    upstream backend {
        server backend:4000;
        keepalive 32;
    }

    upstream frontend {
        server frontend:3000;
        keepalive 32;
    }

    # ----------------------------------------------------------
    # Rate limiting zones
    # ----------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=api:10m   rate=30r/s;
    limit_req_zone $binary_remote_addr zone=webhook:10m rate=10r/s;

    # ----------------------------------------------------------
    # HTTP → HTTPS redirect
    # ----------------------------------------------------------
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Allow Let's Encrypt / ACME challenges
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ----------------------------------------------------------
    # HTTPS main server
    # ----------------------------------------------------------
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name _;                 # replace with your domain in production

        # TLS
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_session_timeout 1d;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_tickets off;

        # Modern TLS configuration (TLSv1.2+ only)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers   ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;

        # HSTS (1 year, include subdomains)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ----------------------------------------------------------
        # Security headers
        # ----------------------------------------------------------
        add_header X-Frame-Options           "SAMEORIGIN"                           always;
        add_header X-Content-Type-Options    "nosniff"                              always;
        add_header X-XSS-Protection          "1; mode=block"                        always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"      always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

        # Proxy common settings
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_connect_timeout 10s;

        # ----------------------------------------------------------
        # /api  →  NestJS backend
        # ----------------------------------------------------------
        location /api/ {
            limit_req zone=api burst=60 nodelay;

            proxy_pass http://backend/;

            # Strip the /api prefix before forwarding
            rewrite ^/api/(.*) /$1 break;

            # WebSocket upgrade headers (for Socket.IO / ws)
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # LINE webhook (separate, stricter rate limit)
        location /api/webhook/line {
            limit_req zone=webhook burst=20 nodelay;
            proxy_pass http://backend/webhook/line;
        }

        # ECPay callbacks (no rate limit — fixed source IPs)
        location /api/payments/ecpay/ {
            proxy_pass http://backend/payments/ecpay/;
        }

        # ----------------------------------------------------------
        # Next.js HMR WebSocket (dev only — remove in prod)
        # ----------------------------------------------------------
        # location /_next/webpack-hmr {
        #     proxy_pass http://frontend/_next/webpack-hmr;
        #     proxy_set_header Upgrade    $http_upgrade;
        #     proxy_set_header Connection "upgrade";
        # }

        # ----------------------------------------------------------
        # Static assets — Next.js _next/static (long cache)
        # ----------------------------------------------------------
        location /_next/static/ {
            proxy_pass http://frontend/_next/static/;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
        }

        # ----------------------------------------------------------
        # /  →  Next.js frontend
        # ----------------------------------------------------------
        location / {
            proxy_pass http://frontend;

            # WebSocket upgrade (Next.js route handlers, etc.)
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $http_upgrade;

            # Buffering — disable for SSE / streaming responses
            proxy_buffering off;
        }

        # ----------------------------------------------------------
        # Health check endpoint (no auth required)
        # ----------------------------------------------------------
        location /health {
            access_log off;
            proxy_pass http://backend/health;
        }
    }
}
